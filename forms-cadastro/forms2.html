<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link rel="stylesheet" href="forms.css">
</head>
<body>

<div class="container">
  <h2>Faça seu cadastro!</h2>
  <p>Compre online 🛒</p>

  <form class="formulario">

    <!-- Dados Pessoais -->
    <h3>Dados Pessoais</h3>

    <div class="grid">
      <label>Nome</label>
      <input type="text">

      <label>E-mail</label>
      <input type="email">

      <label>Data de Nascimento</label>
      <input type="date">

      <label>CPF</label>
      <input type="text" placeholder="000.000.000-00">
    </div>

    <!-- Endereço -->
    <h3>Endereço</h3>

    <div class="grid">
      <label>Rua</label>
      <input type="text">

      <label>Número</label>
      <input type="text">

      <label>Bairro</label>
      <input type="text">

      <label>CEP</label>
      <input type="text" pattern="\d{3}\.{3}\.{3}\-\d{2}" placeholder="00000-000">

      <label>Cidade</label>
      <input type="text">

      <label>Estado</label>
      <select>
        <option>Selecione um estado</option>
      </select>
    </div>

    <!-- Login -->
    <h3>Login</h3>

    <div class="grid">
      <label>Imagem de perfil</label>
      <input type="file">

      <label>Login</label>
      <input type="text">

      <label>Senha</label>
      <input type="password">

      <label>Confirmação de Senha</label>
      <input type="password">
    </div>

    <!-- Botões -->
    <div class="botoes">
      <button type="reset" class="cancelar">Cancelar</button>
      <button type="submit" class="enviar">Enviar</button>
    </div>

  </form>
</div>

</body>
</html>
