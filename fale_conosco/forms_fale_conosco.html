    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <title>Fale Conosco</title>
    <link rel="stylesheet" href="css/fale-conosco.css">
    </head>
    <body>

    <div class="container">
        <h2>Fale Conosco</h2>
        <p>
        Estamos aqui para ajudar! Preencha o formulário abaixo e entraremos em contato
        com você o mais breve possível.
        </p>

        <form>
        <div class="form-group">
            <label>Primeiro Nome</label>
            <input type="text" placeholder="Seu nome.." maxlength="48">
        </div>

        <div class="form-group">
            <label>Último Nome</label>
            <input type="text" placeholder="Seu sobrenome.." maxlength="48">
        </div>

        <div class="form-group">
            <label>E-mail:</label>
            <input type="email" placeholder="Seu e-mail.." maxlength="100">
        </div>

        <div class="form-group">
            <label>País</label>
            <select>
                <optgroup label="América">
                    <option>Selecione</option>
                    <option>Brasil</option>
                    <option>Estados Unidos</option>
                    <option>Canadá</option>
                </optgroup>
                <optgroup label="Europa">
                    <option>Reino Unido</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>Assunto</label>
            <textarea placeholder="Escreva aqui.." maxlength="255"></textarea>
        </div>

        <div class="buttons">
            <button type="reset" class="limpar">Limpar</button>
            <button type="submit" class="enviar">Enviar</button>
        </div>
        </form>

        <p class="rodape">Em caso de dúvidas entre em contato 📞</p>
    </div>

    </body>
    </html>
